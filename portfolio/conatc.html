<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanka | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <div class="container">
        <header class="blog-navbar"> <h1>Get In Touch</h1>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="blog.html">Blog</a>
            </nav>
        </header>

        <main>
            <div class="contact-card">
                <h2>Contact Form</h2>
                <p class="subtitle">Feel free to drop a message. I'll get back to you as soon as possible.</p>
                
                <form onsubmit="sendform(event)">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Your name">
                    
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Your email address">

                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required placeholder="What is this about?">

                    <label for="message">Message</label>
                    <textarea id="message" name="message" required placeholder="Type your message here..."></textarea>

                    <button type="submit">Send Message</button>
                </form>

                <p id="output"></p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
